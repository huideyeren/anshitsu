name: Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run Rust Tests
        run: cargo test --manifest-path native/anshitsu-color/Cargo.toml

  testing:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        poetry-version: [1.8.2]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run image
        uses: abatilo/actions-poetry@v4.0.0
        with:
          poetry-version: ${{ matrix.poetry-version }}
      - name: Install Dependencies
        run: poetry install --no-interaction
      - name: Format Check
        run: poetry run flake8 src/ --ignore=E501,E203,W503,W504,F841
#      - name: Type Check
#        run: poetry run mypy src/
      - name: Run Tests
        run: poetry run pytest -v tests/ --cov-config=.coveragerc --cov=src/ --cov-branch --cov-report=xml
      - name: Upload coverage to Codecov
        if: ${{ matrix.python-version == '3.14' && matrix.os == 'ubuntu-latest' }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # ← CODECOVのアップロードトークン
          file: ./coverage.xml
          name: codecov-umbrella
          fail_ci_if_error: ${{ github.actor != 'dependabot[bot]' }}
