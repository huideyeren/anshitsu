name: Upload Python Package

on:
  workflow_dispatch:
    inputs:
      release_note:
        description: "Release notes. Leave empty to generate notes automatically."
        required: false

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Read package version
        id: version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['tool']['poetry']['version'])")
          TAG="v${VERSION}"
          git fetch --tags
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists."
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

  build-native-wheels:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: anshitsu-native-wheel-linux
          - os: macos-latest
            artifact-name: anshitsu-native-wheel-macos
          - os: windows-latest
            artifact-name: anshitsu-native-wheel-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Build Tools
        run: pipx install poetry==1.8.2
      - name: Build Native Wheel
        run: python scripts/build_native_wheel.py
      - name: Upload Native Wheel
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/*.whl
          if-no-files-found: error

  publish-python:
    needs:
      - version
      - build-native-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install Poetry
        run: pipx install poetry==1.8.2
      - name: Configure PyPI
        run: poetry config pypi-token.pypi "${{ secrets.PYPI_TOKEN }}"
      - name: Build Source Distribution
        run: poetry build -f sdist
      - name: Download Native Wheels
        uses: actions/download-artifact@v4
        with:
          pattern: anshitsu-native-wheel-*
          path: downloaded-wheels
          merge-multiple: true
      - name: Collect Distributions
        run: cp downloaded-wheels/*.whl dist/
      - name: Publish Package
        run: poetry publish
      - name: Upload Python Distribution
        uses: actions/upload-artifact@v4
        with:
          name: anshitsu-python-dist
          path: dist/*
          if-no-files-found: error

  create-release:
    needs:
      - version
      - build-native-wheels
      - publish-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download Release Assets
        uses: actions/download-artifact@v4
        with:
          name: anshitsu-python-dist
          path: release-assets
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTE: ${{ github.event.inputs.release_note }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          mapfile -t ASSETS < <(find release-assets -type f | sort)
          if [ -n "${RELEASE_NOTE}" ]; then
            printf "%s\n" "${RELEASE_NOTE}" > RELEASE_NOTES.md
            gh release create "${TAG}" "${ASSETS[@]}" \
              --target "${GITHUB_SHA}" \
              --title "${TAG}" \
              --notes-file RELEASE_NOTES.md
          else
            gh release create "${TAG}" "${ASSETS[@]}" \
              --target "${GITHUB_SHA}" \
              --title "${TAG}" \
              --generate-notes
          fi
